<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>siiyar - home</title>
    <link rel="icon" href="icons/icon.png">
    <link rel="stylesheet" href="style.css">
    <style>
        .navbar {
            animation: fadeInDown 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        #mainContent {
            animation: popIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="particles-container" id="particles"></div>
    <div class="cursor-glow" id="cursorGlow"></div>

    <nav class="navbar" id="navbar">
        <a href="index.html" class="nav-logo">siiyar.</a>
        <div class="nav-links">
            <a href="index.html" class="nav-link active">Homepage</a>
            <a href="projects.html" class="nav-link">Projects</a>
            <a href="bio.html" class="nav-link">Bio</a>
            <a href="https://github.com/siiyar" target="_blank" class="nav-link">GitHub</a>
        </div>
    </nav>

    <div id="mainContent" class="home-layout">
        <section class="hero-section floating-card" id="heroSection">
            <h1 class="hero-title glitch-text" data-text="hello, i'm siiyar.">hello, i'm siiyar.</h1>
            <p class="hero-subtitle">i'm a 17-year-old dude who likes building interesting projects, and seals. welcome
                to my personal space on the internet. :D</p>
            <div class="hero-buttons">
                <a href="https://github.com/Siiyar" class="btn-primary">View GitHub</a>
                <a href="projects.html" class="btn-secondary">My Projects</a>
            </div>
        </section>

        <div id="audioControls" style="display:none;">
            <button id="playPauseButton">
                <svg class="play-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z" />
                </svg>
                <svg class="pause-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                    style="display:none;">
                    <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z" />
                </svg>
            </button>
            <div id="songName"></div>
            <button id="prevButton"></button>
            <span id="currentTime"></span>
            <input type="range" id="progressSlider" min="0" max="100" value="0" step="0.1">
            <span id="duration"></span>
            <button id="nextButton"></button>
            <audio id="backgroundAudio"></audio>
        </div>

        <div style="display:none;">
            <div id="volumeVisualizer"></div>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
